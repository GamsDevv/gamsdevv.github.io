<!DOCTYPE html>
<html>
<head>
  <title>Gams Macro</title>
  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: linear-gradient(135deg, #0f0f0f, #1a1a1a);
      color: white;
      text-align: center;
    }

    .container {
      padding: 60px 20px;
    }

    h1 {
      font-size: 48px;
    }

    p {
      color: #ccc;
    }

    .box {
      background: #111;
      margin: 40px auto;
      padding: 30px;
      border-radius: 12px;
      max-width: 500px;
      box-shadow: 0 0 20px rgba(0,255,150,0.2);
    }

    ul {
      text-align: left;
      margin: 20px 0;
    }

    li {
      margin: 10px 0;
    }

    .price {
      font-size: 28px;
      margin: 20px 0;
      color: #00ff99;
    }

    .btn {
      display: inline-block;
      background: #00ff99;
      color: black;
      padding: 15px 30px;
      font-size: 18px;
      border-radius: 8px;
      text-decoration: none;
      transition: 0.2s;
    }

    .btn:hover {
      background: #00cc77;
    }

    .footer {
      margin-top: 60px;
      font-size: 12px;
      color: #777;
    }
  </style>
</head>

<body>

<div class="container">
  <h1>Gams Macro</h1>
  <p>Auto farm • Auto reroll • Smart OCR system</p>

  <div class="box">
    <h2>Features</h2>
    <ul>
      <li>✔ Fully automated gameplay</li>
      <li>✔ OCR detection system</li>
      <li>✔ Multiplayer support</li>
      <li>✔ Easy setup</li>
    </ul>

    <div class="price">€5</div>

    <a href="YOUR_PAYPAL_LINK_HERE" class="btn">Buy Now</a>
  </div>

  <div class="footer">
    Not affiliated with Roblox. Use at your own risk.
  </div>
</div>

</body>
</html>
